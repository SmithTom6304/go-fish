[package]
name = "go-fish-web"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "fisher"
path = "src/bin/fisher.rs"

[[bin]]
name = "pond"
path = "src/bin/pond.rs"

[dependencies]
go-fish = { path = "../go-fish", version = "0.1.1" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0.102"
log = "0.4.29"
env_logger = "0.11.9"
futures-util = "0.3.32"
tokio = { version = "1.49.0", features = ["rt", "macros", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite = "0.28.0"